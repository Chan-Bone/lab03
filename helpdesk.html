<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" >
  <meta name="description" content="Seek tutors to help you in case of problems." >
  <meta name="keywords" content="HTML, Form, tags" >
  <meta name="author" content="A Lecturer"  >
  <title>CWA Help Desk Appointment</title>

</head>

<body>
	<a href="https://www.swinburne.edu.au/" target=_blank>
		<img src="logo.png" alt="Image link broke" title="Swinburne">
	</a>
	
	<h1>CWA Help Desk Appointment</h1>
	<p>The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday</p>
	<p>Check Blackboard for when CWA tutors will be there.</p>

<form method="post" action="http://mercury.swin.edu.au/it000000/formtest.php">
		<fieldset>
			<legend>Student Details</legend>
			<p>
				
				<label for="student_id">Student ID</label> 
				<input 
					type="text" 
					name= "student_id" 
					id="student_id" 
					size="18" 
					required="required" 
					pattern="[0-9]{7,10}"
					title="Enter a student ID with 7 to 10 digits/numbers"
				>
				
			</p>

			<p>
				
				<label for="given_name">Given Name</label> 
				<input 
					type="text" 
					name= "given_name" 
					id="given_name"  
					size="18" 
					required="required"  
					pattern="[a-zA-Z]{1,15}"
					title="Enter a given name with 1 to 15 english letters"
				>

				<label for="family_name">Family Name</label> 
				<input 
					type="text" 
					name= "family_name" 
					id="family_name" 
					size="18" 
					required="required"
					pattern="[a-zA-Z]{1,15}"
					title="Enter a family name with 1 to 15 english letters"
					>
				
			</p>
		</fieldset>
		<fieldset>
			<legend>Your unit</legend>
			<p>
				<label for="COS10011" >COS10011</label> 
				<input type="radio" id="COS10011" name="your_unit" value="COS10011" required="required">
			
				<label for="COS60004">COS60004</label> 
				<input type="radio" id="COS60004" name="your_unit" value="COS60004">
			
				<label for="COS60007">COS60007</label> 
				<input type="radio" id="COS60007" name="your_unit" value="COS60007">
			</p>

			<p>
				<label for="your_tutor">Your Tutor</label> 
				<select name="your_tutor" id="your_tutor" required="required">
					<option value="" selected >Please Select</option>
					<option value="Pawani Rasaratnam" >Pawani Rasaratnam</option>			
					<option value="John Doe" >John Doe</option>
					<option value="Lorem Ipsum" >Lorem Ipsum</option>
				</select>
			</p>

		</fieldset>

		
		
		<fieldset>
			<legend>Issue</legend>
			<p>
				<label for="html">HTML</label> 
				<input type="checkbox" id="html" name="issue[]" value="html" checked="checked">
			
				<label for="css">CSS</label> 
				<input type="checkbox" id="css" name="issue[]" value="css">
			
				<label for="javascript">JavaScript</label> 
				<input type="checkbox" id="javascript" name="issue[]" value="javascript">
			
				<label for="php">PHP</label> 
				<input type="checkbox" id="php" name="issue[]" value="php">
			
				<label for="mysql">MySQL</label> 
				<input type="checkbox" id="mysql" name="issue[]" value="mysql">
			</p>

			<p>
				<label for="issue_description">Description of Issue</label>
				<br>
				<textarea 
					id="issue_description" 
					name="issue_description" 
					rows="4" 
					cols="40" 
					placeholder="Write description of your problem here..."
					required="required"
				></textarea>
			</p>
		</fieldset>


		<fieldset>
			<legend>Preferred Date/Time</legend>
			<p>
				<label for="date">Date</label> 
				<input 
					type="date" 
					name= "date" 
					id="date" 
					placeholder="dd/mm/yyyy" 
					maxlength="10" 
					size="10"
					required="required"

					
				>
				<!-- 
					pattern="\d{2}/\d{2}/\d{4}"
					title="dd/mm/yyyy (day, numerical month, year), seperated with a slash (/)"
					
					pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
					title="HH:MM (hour, minutes), seperated with a colon (:). Please enter time with a 24-hour format"


					\d : Match any digit
					{n} : Match n of the preceding item. (\d{2} means match 2 digits)
					/ : Just match any literal slash (/) 
				-->
			</p>

			<p>
				<label for="time">Time</label> 
				<input 
					type="time" 
					name= "time" 
					id="time" 
					placeholder="00:00" 
					maxlength="10" 
					size="10"
					required="required"
				>
			</p>

		</fieldset>

	<input type= "submit" value="Book">
	<input type= "reset" value="Reset Form">
</form>
</body>
</html>
