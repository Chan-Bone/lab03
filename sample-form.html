<!DOCTYPE html>
<html lang = "en">
    
<head>
    <meta charset="utf-8">
    <title> A simple Form </title>
</head>
    
<body>
    <img src="logo.png" alt="Image link broke" title="Swinburne">
    <br>
    <h1>A Simple Form</h1>
    <hr>

    <form method="post" action="https://mercury.swin.edu.au/it00000/formtest.php"> 
        <fieldset>
            <legend>Personal Details</legend>
            <p>
                <label for="fname">First Name:</label>
                <input type="text" name = "fname" id="fname" pattern="[a-zA-Z ]$(2,20)">
            </p>

            <p>Gender:<br>
                <label for="male">Male</label>
                <input type = "radio" name = "gender" id= "male" value="M" required>

                <label for="female">Female</label>
                <input type = "radio" name = "gender" id= "female" value="F" required>

                <label>Other <input type = "radio" name = "gender" value="O" required></label>
                
            </p>
            </fieldset>

            <p><label for = "rk">How would you like to rank the seminar?</label><br>
                <select name = "rank" id="rk">
                    <option value = "3" selected>Excellent</option>
                    <option value = "2" >Normal</option>
                    <option value = "1" >Very bad :(</option>
                </select>
            </p>
            
            <p><label>Comments
                <br>
                <textarea name="">TextArea</textarea>
            </label>

            </p>
        


    </form>
</body>
